<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Birth Pulse - Philips Women's Health</title>
    <script src="https://d3js.org/d3.v7.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body, html {
            margin: 0; padding: 0; width: 100vw; height: 100vh;
            overflow: hidden; background-color: #020617;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; color: white;
            cursor: default; touch-action: none;
        }

        .ui-root {
            position: absolute; left: 5vw; top: 0; bottom: 0;
            width: 40vw; z-index: 500; pointer-events: none;
            display: flex; flex-direction: column; justify-content: center;
            gap: 2vh;
        }

        .philips-title { font-size: 3vh; font-weight: 900; color: #3b82f6; letter-spacing: 2px; text-transform: uppercase; }
        .main-heading { font-size: 4.8vh; color: #e9d5ff; font-weight: 800; line-height: 1.1; white-space: nowrap; }
        
        .stats-box { pointer-events: auto; width: 100%; }
        .label { font-size: 2.2vh; color: #38bdf8; text-transform: uppercase; font-weight: 700; letter-spacing: 1.5px; }
        .count { font-size: 11vh; font-weight: 900; color: #fbbf24; line-height: 1; margin: 0.5vh 0; text-shadow: 0 0 20px rgba(251, 191, 36, 0.3); }
        
        .progress-ui { width: 85%; margin-top: 5px; }
        .bar-wrapper { width: 100%; height: 8px; background: rgba(255,255,255,0.1); border-radius: 10px; overflow: hidden; }
        .bar-fill { height: 100%; width: 0%; background: #fbbf24; box-shadow: 0 0 15px rgba(251, 191, 36, 0.5); transition: width 0.5s ease; }
        #clock { color: #94a3b8; font-size: 2.8vh; font-weight: 500; display: block; text-align: center; margin-top: 1vh; }

        .stars-container { position: absolute; width: 100%; height: 100%; z-index: 1; pointer-events: none; }
        .star { position: absolute; background: white; border-radius: 50%; animation: blink var(--t) infinite ease-in-out; }
        @keyframes blink { 0%, 100% { opacity: 0.2; } 50% { opacity: 0.8; } }
        
        .canvas-container { position: absolute; left: 0; top: 0; width: 100vw; height: 100vh; z-index: 5; }
        #main-canvas { width: 100%; height: 100%; cursor: grab; }

        #loading { position: absolute; width: 100%; height: 100%; background: #000; display: flex; align-items: center; justify-content: center; z-index: 11000; color: #3b82f6; font-size: 3vh; }
    </style>
</head>
<body>

    <div id="loading">GENERATING WORLD VIEW...</div>

    <div class="ui-root">
        <div class="header-box">
            <div class="philips-title">Philips</div>
            <h1 class="main-heading">Mother & Child Care<br>Womens Health</h1>
        </div>

        <div class="stats-box">
            <span class="label">Global Births Today</span>
            <div id="birthCount" class="count">0</div>
            <div class="progress-ui">
                <div class="bar-wrapper"><div id="bar" class="bar-fill"></div></div>
                <span id="clock">00:00:00</span>
            </div>
        </div>
    </div>

    <div class="stars-container" id="starfield"></div>
    <div class="canvas-container"><canvas id="main-canvas"></canvas></div>

    <script>
        var BIRTH_RATE = 4.34, EARTH_ROT_SPD = 0.008, RESUME_DELAY = 4000, TARGET_TILT = -12;
        var worldGeo = null, flashingCountries = [], comets = [];
        var canvas = document.getElementById("main-canvas"), context = canvas.getContext("2d");
        var w, h, rotX = 0, rotY = TARGET_TILT, lastT = Date.now(), lastIntT = Date.now(), isDragging = false;

        function setSizes() { w = window.innerWidth; h = window.innerHeight; canvas.width = w; canvas.height = h; }
        setSizes();
        
        var projection = d3.geoOrthographic().scale(h/2.2).translate([w*0.72, h*0.5]).clipAngle(90);
        var path = d3.geoPath(projection, context);

        // Physics for Sun/Planets
        var planets = [
            { d: 320, sz: 35, spd: 0.0008, ang: Math.random()*7, col1: "#f1f5f9", col2: "#94a3b8" },
            { d: 550, sz: 25, spd: 0.0003, ang: Math.random()*7, col1: "#fed7aa", col2: "#7c2d12", rings: true }
        ];

        canvas.addEventListener('mousedown', function(e) { isDragging = true; lastX = e.clientX; lastY = e.clientY; lastIntT = Date.now(); });
        window.addEventListener('mousemove', function(e) { 
            if (isDragging) { rotX += (e.clientX - lastX) * 0.3; rotY -= (e.clientY - lastY) * 0.3; lastX = e.clientX; lastY = e.clientY; lastIntT = Date.now(); }
        });
        window.addEventListener('mouseup', function() { isDragging = false; });

        function init() {
            d3.json("https://raw.githubusercontent.com/nvkelso/natural-earth-vector/master/geojson/ne_110m_admin_0_countries.geojson").then(function(data) {
                worldGeo = data;
                document.getElementById('loading').style.display='none';
                requestAnimationFrame(renderLoop);
                startSimulation();
            });
        }

        function renderLoop() {
            var now = Date.now(), dt = now - lastT; lastT = now;
            if (!isDragging && now - lastIntT > RESUME_DELAY) {
                rotX += EARTH_ROT_SPD * dt;
                rotY += (TARGET_TILT - rotY) * 0.02;
            }

            projection.rotate([rotX, rotY]);
            context.clearRect(0,0,w,h);
            var ex=w*0.72, ey=h*0.5;

            // Light Source (Sun)
            var sAng = now * 0.00002, sx = ex + Math.cos(sAng)*w*0.5, sy = ey + Math.sin(sAng)*h*0.3;
            var sG = context.createRadialGradient(sx, sy, 0, sx, sy, 50);
            sG.addColorStop(0, "#fff"); sG.addColorStop(1, "transparent");
            context.fillStyle = sG; context.beginPath(); context.arc(sx, sy, 50, 0, 7); context.fill();

            // Planets
            planets.forEach(p => {
                p.ang += p.spd * dt * 0.1;
                var px = ex + Math.cos(p.ang) * p.d, py = ey + Math.sin(p.ang) * p.d * 0.6;
                if(p.rings) { context.strokeStyle = "rgba(254,215,170,0.2)"; context.beginPath(); context.ellipse(px, py, p.sz*2, p.sz*0.6, 0.2, 0, 7); context.stroke(); }
                var g = context.createRadialGradient(px-p.sz/3, py-p.sz/3, 0, px, py, p.sz);
                g.addColorStop(0, p.col1); g.addColorStop(1, p.col2);
                context.fillStyle = g; context.beginPath(); context.arc(px, py, p.sz, 0, 7); context.fill();
                // Dynamic Shadow
                var a = Math.atan2(py-sy, px-sx);
                var sh = context.createRadialGradient(px + Math.cos(a)*p.sz*0.6, py + Math.sin(a)*p.sz*0.6, 0, px, py, p.sz);
                sh.addColorStop(0, "transparent"); sh.addColorStop(1, "rgba(0,0,0,0.8)");
                context.fillStyle = sh; context.beginPath(); context.arc(px, py, p.sz+0.5, 0, 7); context.fill();
            });

            // Earth
            var r = projection.scale();
            var oG = context.createRadialGradient(ex-r/3, ey-r/3, r/10, ex, ey, r);
            oG.addColorStop(0, "#1e40af"); oG.addColorStop(1, "#020617");
            context.fillStyle = oG; context.beginPath(); context.arc(ex, ey, r, 0, 7); context.fill();

            if (worldGeo) {
                context.beginPath(); path(worldGeo); 
                context.fillStyle = "#10b981"; context.fill();
                context.strokeStyle = "rgba(255,255,255,0.1)"; context.stroke();

                // FIX: Flashing Logic
                var currentNow = Date.now();
                flashingCountries.forEach((f, index) => {
                    var age = currentNow - f.time;
                    if (age < 1000) {
                        context.save();
                        context.globalAlpha = 1 - (age / 1000);
                        context.fillStyle = "#ffffff";
                        context.beginPath(); path(f.feature); context.fill();
                        context.restore();
                    } else {
                        flashingCountries.splice(index, 1);
                    }
                });
            }

            // Earth Shadow
            var eSA = Math.atan2(ey-sy, ex-sx);
            var eSh = context.createRadialGradient(ex + Math.cos(eSA)*r*0.5, ey + Math.sin(eSA)*r*0.5, 0, ex, ey, r);
            eSh.addColorStop(0, "transparent"); eSh.addColorStop(1, "rgba(0,0,0,0.8)");
            context.fillStyle = eSh; context.beginPath(); context.arc(ex, ey, r+1, 0, 7); context.fill();

            requestAnimationFrame(renderLoop);
        }

        function startSimulation() {
            setInterval(function() {
                var now = new Date();
                var start = new Date(now.getFullYear(), now.getMonth(), now.getDate()).getTime();
                var elapsed = (Date.now() - start) / 1000;
                document.getElementById('birthCount').innerText = Math.floor(elapsed * BIRTH_RATE).toLocaleString('de-DE');
                document.getElementById('clock').innerText = now.toLocaleTimeString('en-GB');
                document.getElementById('bar').style.width = (elapsed / 86400 * 100) + "%";

                // Trigger Globe Flash
                if (worldGeo && worldGeo.features.length > 0) {
                    var randomFeature = worldGeo.features[Math.floor(Math.random() * worldGeo.features.length)];
                    flashingCountries.push({ feature: randomFeature, time: Date.now() });
                }
            }, 1000 / (BIRTH_RATE / 2)); // Flash frequency adjusted to birth rate
        }

        var field = document.getElementById('starfield');
        for (var i = 0; i < 60; i++) {
            var s = document.createElement('div'); s.className = 'star';
            s.style.width = s.style.height = (Math.random()*2) + 'px';
            s.style.left = Math.random()*100 + '%'; s.style.top = Math.random()*100 + '%';
            s.style.setProperty('--t', (2 + Math.random()*3) + 's');
            field.appendChild(s);
        }
        window.onresize = setSizes; init();
    </script>
</body>
</html>
