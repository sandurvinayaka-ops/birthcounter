<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Birth Pulse - Philips Top-Left Layout</title>
    <script src="https://d3js.org/d3.v7.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body, html {
            margin: 0; padding: 0; width: 100vw; height: 100vh;
            overflow: hidden; background-color: #010409;
            font-family: 'Inter', sans-serif; color: white;
            cursor: default; touch-action: none;
        }

        /* BRANDING MOVED TO TOP LEFT */
        .branding-header {
            position: absolute; top: 4vh; left: 4vw;
            z-index: 1000; pointer-events: none;
            display: flex; flex-direction: column; gap: 0.5vh;
        }

        .philips-title { font-size: 3vh; font-weight: 900; color: #3b82f6; letter-spacing: 3px; text-transform: uppercase; }
        .main-heading { font-size: 4.2vh; color: #a855f7; font-weight: 800; line-height: 1.1; text-shadow: 0 0 20px rgba(168, 85, 247, 0.3); }

        /* COUNTER REMAINS IN CENTER-LEFT AREA, SCALED 80% */
        .ui-counter-root {
            position: absolute; left: 4vw; top: 45%; 
            width: 38vw; z-index: 500; pointer-events: none;
            display: flex; flex-direction: column; justify-content: center;
            gap: 1.5vh;
            transform: scale(0.8);
            transform-origin: left center;
        }
        
        .stats-box { pointer-events: auto; width: 100%; }
        .label { font-size: 2.2vh; color: #94a3b8; text-transform: uppercase; font-weight: 700; letter-spacing: 2px; }
        .count { font-size: 13vh; font-weight: 900; color: #fbbf24; line-height: 1; margin: 0.5vh 0; text-shadow: 0 0 30px rgba(251, 191, 36, 0.4); }
        
        .progress-container { width: 95%; margin-top: 10px; }
        .bar-wrapper { width: 100%; height: 14px; background: rgba(255,255,255,0.05); border-radius: 10px; overflow: hidden; border: 1px solid rgba(168, 85, 247, 0.4); }
        .bar-fill { height: 100%; width: 0%; background: linear-gradient(90deg, #fbbf24, #f59e0b); box-shadow: 0 0 20px rgba(251, 191, 36, 0.6); }
        .time-labels { display: flex; justify-content: space-between; margin-top: 8px; font-weight: 800; font-size: 2.2vh; color: #a855f7; }
        
        #clock { color: #fbbf24; font-size: 3.5vh; font-weight: 800; display: block; text-align: center; margin-top: 1.5vh; letter-spacing: 2px; }

        /* STARFIELD & CANVAS */
        .stars-container { position: absolute; width: 100%; height: 100%; z-index: 1; pointer-events: none; }
        .star { position: absolute; background: white; border-radius: 50%; animation: blink var(--t) infinite ease-in-out; }
        @keyframes blink { 0%, 100% { opacity: 0.1; transform: scale(0.8); } 50% { opacity: 1; transform: scale(1.2); box-shadow: 0 0 8px #fff; } }

        .canvas-container { position: absolute; left: 0; top: 0; width: 100vw; height: 100vh; z-index: 5; }
        #main-canvas { width: 100%; height: 100%; cursor: grab; }
    </style>
</head>
<body>

    <div class="branding-header">
        <div class="philips-title">Philips</div>
        <h1 class="main-heading">Mother & Child Care<br>Womens Health</h1>
    </div>

    <div class="ui-counter-root">
        <div class="stats-box">
            <span class="label">Live Global Births Today</span>
            <div id="birthCount" class="count">0</div>
            <div class="progress-container">
                <div class="bar-wrapper"><div id="bar" class="bar-fill"></div></div>
                <div class="time-labels">
                    <span>00:00</span>
                    <span>24:00</span>
                </div>
                <span id="clock">00:00:00</span>
            </div>
        </div>
    </div>

    <div class="stars-container" id="starfield"></div>
    <div class="canvas-container"><canvas id="main-canvas"></canvas></div>

    <script>
        var BIRTH_RATE = 4.34, EARTH_ROT_SPD = 0.018, RESUME_DELAY = 2500, TARGET_TILT = -18;
        var worldGeo = null, flashingCountries = [], comets = [];
        var canvas = document.getElementById("main-canvas"), context = canvas.getContext("2d");
        var w, h, rotX = 0, rotY = TARGET_TILT, lastT = Date.now(), lastIntT = Date.now(), isDragging = false;

        function setSizes() { w = window.innerWidth; h = window.innerHeight; canvas.width = w; canvas.height = h; }
        setSizes();
        
        var projection = d3.geoOrthographic().scale(h/1.9).translate([w*0.73, h*0.5]).clipAngle(90);
        var path = d3.geoPath(projection, context);

        canvas.addEventListener('mousedown', (e) => { isDragging = true; lastX = e.clientX; lastY = e.clientY; lastIntT = Date.now(); });
        window.addEventListener('mousemove', (e) => { 
            if (isDragging) { rotX += (e.clientX - lastX) * 0.25; rotY -= (e.clientY - lastY) * 0.25; lastX = e.clientX; lastY = e.clientY; lastIntT = Date.now(); }
        });
        window.addEventListener('mouseup', () => isDragging = false);

        function init() {
            d3.json("https://raw.githubusercontent.com/nvkelso/natural-earth-vector/master/geojson/ne_110m_admin_0_countries.geojson").then(function(data) {
                worldGeo = data;
                requestAnimationFrame(renderLoop);
                startSimulation();
            });
        }

        function renderLoop() {
            var now = Date.now(), dt = now - lastT; lastT = now;
            if (!isDragging && now - lastIntT > RESUME_DELAY) {
                rotX += EARTH_ROT_SPD * dt;
                rotY += (TARGET_TILT - rotY) * 0.05;
            }

            projection.rotate([rotX, rotY]);
            context.clearRect(0,0,w,h);
            var ex=w*0.73, ey=h*0.5, r=projection.scale();

            updateComets(context, dt);

            // GOLDEN SUN
            var sTime = now * 0.0001, sx = ex + Math.cos(sTime)*(w*0.42), sy = ey + Math.sin(sTime)*(h*0.32);
            var sunG = context.createRadialGradient(sx, sy, 0, sx, sy, 110);
            sunG.addColorStop(0, "#ffffff");
            sunG.addColorStop(0.3, "#fbbf24");
            sunG.addColorStop(1, "transparent");
            context.fillStyle = sunG; context.beginPath(); context.arc(sx, sy, 100, 0, 7); context.fill();

            // OCEAN
            var oG = context.createRadialGradient(ex-r/4, ey-r/4, r/5, ex, ey, r);
            oG.addColorStop(0, "#2563eb"); oG.addColorStop(0.6, "#1e3a8a"); oG.addColorStop(1, "#0f172a");
            context.fillStyle = oG; context.beginPath(); context.arc(ex, ey, r, 0, 7); context.fill();

            // COUNTRIES
            if (worldGeo) {
                context.beginPath(); path(worldGeo); 
                context.fillStyle = "#cbd5e1"; context.fill();
                context.strokeStyle = "rgba(255, 255, 255, 0.8)"; context.lineWidth = 1; context.stroke();

                var currentNow = Date.now();
                flashingCountries.forEach((f, idx) => {
                    var age = currentNow - f.time;
                    if (age < 1500) {
                        context.save();
                        context.globalAlpha = 1 - (age/1500);
                        context.fillStyle = "#ff00ff"; context.shadowBlur = 40; context.shadowColor = "#ffffff";
                        context.beginPath(); path(f.feature); context.fill();
                        context.restore();
                    } else { flashingCountries.splice(idx, 1); }
                });
            }

            // SHADOW
            var eSA = Math.atan2(ey-sy, ex-sx);
            var eSh = context.createRadialGradient(ex + Math.cos(eSA)*r*0.6, ey + Math.sin(eSA)*r*0.6, 0, ex, ey, r);
            eSh.addColorStop(0, "transparent"); eSh.addColorStop(1, "rgba(0,0,0,0.65)");
            context.fillStyle = eSh; context.beginPath(); context.arc(ex, ey, r+1, 0, 7); context.fill();

            requestAnimationFrame(renderLoop);
        }

        function updateComets(ctx, dt) {
            if (Math.random() < 0.015) {
                comets.push({ x: Math.random() * w, y: -50, v: 4 + Math.random() * 8, angle: Math.PI / 4 + (Math.random() * 0.2), len: 40 + Math.random() * 60, life: 1.0 });
            }
            comets.forEach((c, i) => {
                c.x -= c.v * Math.cos(c.angle); c.y += c.v * Math.sin(c.angle);
                c.life -= 0.005;
                var grad = ctx.createLinearGradient(c.x, c.y, c.x + c.len, c.y - c.len);
                grad.addColorStop(0, `rgba(255, 255, 255, ${c.life})`);
                grad.addColorStop(1, 'transparent');
                ctx.strokeStyle = grad; ctx.lineWidth = 2; ctx.beginPath();
                ctx.moveTo(c.x, c.y); ctx.lineTo(c.x + c.len, c.y - c.len); ctx.stroke();
                if (c.life <= 0) comets.splice(i, 1);
            });
        }

        function startSimulation() {
            setInterval(function() {
                var now = new Date(), start = new Date(now.getFullYear(), now.getMonth(), now.getDate()).getTime();
                var elapsed = (Date.now() - start) / 1000;
                document.getElementById('birthCount').innerText = Math.floor(elapsed * BIRTH_RATE).toLocaleString('de-DE');
                document.getElementById('clock').innerText = now.toLocaleTimeString('en-GB');
                document.getElementById('bar').style.width = (elapsed / 86400 * 100) + "%";

                if (worldGeo) {
                    var rf = worldGeo.features[Math.floor(Math.random() * worldGeo.features.length)];
                    flashingCountries.push({ feature: rf, time: Date.now() });
                }
            }, 1000 / (BIRTH_RATE / 1.5));
        }

        var field = document.getElementById('starfield');
        for (var i = 0; i < 150; i++) {
            var s = document.createElement('div'); s.className = 'star';
            var size = Math.random() * 2.5;
            s.style.width = s.style.height = size + 'px';
            s.style.left = Math.random() * 100 + '%'; s.style.top = Math.random() * 100 + '%';
            s.style.setProperty('--t', (1 + Math.random() * 4) + 's');
            field.appendChild(s);
        }

        window.onresize = setSizes; init();
    </script>
</body>
</html>
