<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Birth Pulse - Philips Geocentric Edition</title>
    <script src="https://d3js.org/d3.v7.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body, html {
            margin: 0; padding: 0; width: 100vw; height: 100vh;
            overflow: hidden; background-color: #010206;
            font-family: 'Inter', sans-serif; color: white;
        }

        /* BRANDING */
        .branding-header { position: absolute; top: 6%; left: 3%; z-index: 1000; }
        .philips-title { font-size: 3.5vh; font-weight: 900; color: #3b82f6; letter-spacing: 4px; text-transform: uppercase; }
        .main-heading { font-size: 4.5vh; color: #a855f7; font-weight: 800; margin-top: 0.5vh; }

        /* UI COUNTER */
        .ui-counter-root {
            position: absolute; left: 3%; top: 45%; 
            width: 42vw; z-index: 500;
            display: flex; flex-direction: column;
            transform: translateY(-50%);
        }
        .label { font-size: 2.8vh; color: #a855f7; text-transform: uppercase; font-weight: 800; }
        .count { font-size: 20vh; font-weight: 900; color: #fbbf24; line-height: 0.85; margin: 1vh 0; text-shadow: 0 0 35px rgba(251, 191, 36, 0.4); }
        
        .progress-section { width: 100%; margin-top: 1vh; }
        .bar-wrapper { width: 100%; height: 14px; background: rgba(255,255,255,0.05); border-radius: 10px; overflow: hidden; border: 1px solid rgba(168, 85, 247, 0.3); }
        .bar-fill { height: 100%; width: 0%; background: #fbbf24; box-shadow: 0 0 15px #fbbf24; }
        
        .time-meta { display: flex; justify-content: space-between; align-items: flex-start; margin-top: 8px; font-weight: 800; font-size: 2.5vh; color: #a855f7; }
        #clock { color: #fbbf24; font-size: 4.5vh; font-weight: 800; margin-top: -0.5vh; }

        .canvas-container { position: absolute; left: 0; top: 0; width: 100vw; height: 100vh; z-index: 5; pointer-events: none; }
        #main-canvas { width: 100%; height: 100%; }

        .star { position: absolute; background: white; border-radius: 50%; animation: twinkle var(--d) infinite ease-in-out; }
        @keyframes twinkle { 0%, 100% { opacity: 0.2; } 50% { opacity: 0.9; } }
    </style>
</head>
<body>

    <div class="branding-header">
        <div class="philips-title">Philips</div>
        <div class="main-heading">Mother & Child Care Women's Health</div>
    </div>

    <div class="ui-counter-root">
        <span class="label">Live Global Births Today</span>
        <div id="birthCount" class="count">0</div>
        <div class="progress-section">
            <div class="bar-wrapper"><div id="bar" class="bar-fill"></div></div>
            <div class="time-meta">
                <span>00:00</span>
                <div id="clock">00:00:00</div>
                <span>24:00</span>
            </div>
        </div>
    </div>

    <div id="starfield" class="absolute inset-0 z-0"></div>
    <div class="canvas-container"><canvas id="main-canvas"></canvas></div>

    <script>
        const BIRTH_RATE = 4.34;
        let worldGeo = null, flashingCountries = [], comets = [];
        const canvas = document.getElementById("main-canvas"), ctx = canvas.getContext("2d");
        let w, h, rotX = 0, lastT = 0;

        function resize() {
            w = window.innerWidth; h = window.innerHeight;
            canvas.width = w * window.devicePixelRatio;
            canvas.height = h * window.devicePixelRatio;
            ctx.scale(window.devicePixelRatio, window.devicePixelRatio);
        }
        window.onresize = resize;
        resize();

        const projection = d3.geoOrthographic().scale(h * 0.42).translate([w * 0.75, h * 0.52]).clipAngle(90);
        const path = d3.geoPath(projection, ctx);

        async function init() {
            const data = await d3.json("https://raw.githubusercontent.com/nvkelso/natural-earth-vector/master/geojson/ne_110m_admin_0_countries.geojson");
            worldGeo = data;
            createStars();
            requestAnimationFrame(render);
            startSim();
        }

        function render(now) {
            const dt = now - lastT;
            lastT = now;

            rotX += 0.006 * dt; 
            projection.rotate([rotX, -15]);

            ctx.clearRect(0, 0, w, h);
            const r = projection.scale();
            const cx = w * 0.75, cy = h * 0.52;

            // 1. Realistic Comets (Layered in Background)
            drawComets(dt);

            // 2. Geocentric Orbits (Sun & Planets around Earth)
            const sunAngle = now * 0.0002;
            drawOrbitingBody(cx, cy, r * 2.8, sunAngle, 45, "#fbbf24", 1.0); // Sun
            drawOrbitingBody(cx, cy, r * 2.2, sunAngle * 1.5, 15, "#ff4500", 0.4); // Mars
            drawOrbitingBody(cx, cy, r * 1.8, -sunAngle * 1.2, -25, "#e3bb76", 0.3); // Venus

            // 3. Globe Ocean
            const oceanG = ctx.createRadialGradient(cx-r/3, cy-r/3, r/5, cx, cy, r);
            oceanG.addColorStop(0, "#1e40af"); oceanG.addColorStop(1, "#020617");
            ctx.fillStyle = oceanG; ctx.beginPath(); ctx.arc(cx, cy, r, 0, Math.PI*2); ctx.fill();

            // 4. High Contrast Countries
            if (worldGeo) {
                ctx.beginPath(); path(worldGeo);
                ctx.fillStyle = "#f8fafc"; // Brighter white for clear visibility
                ctx.fill();
                ctx.strokeStyle = "rgba(0,0,0,0.5)"; ctx.lineWidth = 0.5; ctx.stroke();

                // 5. Birth Flashes
                const cTime = Date.now();
                flashingCountries.forEach((f, i) => {
                    const age = cTime - f.t;
                    if (age < 2000) {
                        ctx.save();
                        ctx.globalAlpha = 1 - (age/2000);
                        ctx.fillStyle = "#ff00ff";
                        ctx.shadowBlur = 40; ctx.shadowColor = "#ff00ff";
                        ctx.beginPath(); path(f.feature); ctx.fill();
                        ctx.restore();
                    } else flashingCountries.splice(i, 1);
                });
            }

            // 6. Dynamic Shadow (Moves with Sun)
            const shadowG = ctx.createRadialGradient(cx + Math.cos(sunAngle+Math.PI)*r*0.5, cy + Math.sin(sunAngle+Math.PI)*r*0.5, 0, cx, cy, r);
            shadowG.addColorStop(0, "transparent");
            shadowG.addColorStop(1, "rgba(0,0,0,0.8)");
            ctx.fillStyle = shadowG; ctx.beginPath(); ctx.arc(cx, cy, r, 0, 7); ctx.fill();

            requestAnimationFrame(render);
        }

        function drawOrbitingBody(cx, cy, dist, angle, tilt, color, sizeMult) {
            const x = cx + Math.cos(angle) * dist;
            const y = cy + Math.sin(angle) * (dist * 0.3) + (tilt); // Elliptical tilt
            const grad = ctx.createRadialGradient(x, y, 0, x, y, 40 * sizeMult);
            grad.addColorStop(0, "white");
            grad.addColorStop(0.2, color);
            grad.addColorStop(1, "transparent");
            ctx.fillStyle = grad;
            ctx.beginPath(); ctx.arc(x, y, 60 * sizeMult, 0, 7); ctx.fill();
        }

        function drawComets(dt) {
            if (Math.random() < 0.01) {
                comets.push({
                    x: w + 100, y: Math.random() * h,
                    vx: -(0.4 + Math.random() * 0.6), vy: (Math.random() - 0.5) * 0.2,
                    life: 1.0, size: 2 + Math.random() * 3
                });
            }
            comets.forEach((c, i) => {
                c.x += c.vx * dt; c.y += c.vy * dt; c.life -= 0.0003 * dt;
                
                // Realistic Tail using particle stretching
                const tailGrad = ctx.createLinearGradient(c.x, c.y, c.x + 120, c.y - (c.vy * 50));
                tailGrad.addColorStop(0, `rgba(255,255,255,${c.life})`);
                tailGrad.addColorStop(0.4, `rgba(147, 197, 253, ${c.life * 0.5})`);
                tailGrad.addColorStop(1, "transparent");
                
                ctx.strokeStyle = tailGrad; ctx.lineWidth = c.size;
                ctx.beginPath(); ctx.moveTo(c.x, c.y); ctx.lineTo(c.x + 150, c.y); ctx.stroke();

                // Comet Nucleus
                ctx.fillStyle = `rgba(255,255,255,${c.life})`;
                ctx.beginPath(); ctx.arc(c.x, c.y, c.size, 0, 7); ctx.fill();

                if (c.x < -200 || c.life <= 0) comets.splice(i, 1);
            });
        }

        function startSim() {
            setInterval(() => {
                const now = new Date();
                const start = new Date(now.getFullYear(), now.getMonth(), now.getDate()).getTime();
                const elapsed = (Date.now() - start) / 1000;
                document.getElementById('birthCount').innerText = Math.floor(elapsed * BIRTH_RATE).toLocaleString('de-DE');
                document.getElementById('clock').innerText = now.toLocaleTimeString('en-GB');
                document.getElementById('bar').style.width = (elapsed / 86400 * 100) + "%";
                
                if (worldGeo) {
                    const feat = worldGeo.features[Math.floor(Math.random() * worldGeo.features.length)];
                    flashingCountries.push({feature: feat, t: Date.now()});
                }
            }, 1000 / (BIRTH_RATE / 1.5));
        }

        function createStars() {
            const field = document.getElementById('starfield');
            for(let i=0; i<180; i++) {
                const s = document.createElement('div');
                s.className = 'star';
                const size = Math.random()*2.5;
                s.style.width = s.style.height = size+'px';
                s.style.left = Math.random()*100+'%'; s.style.top = Math.random()*100+'%';
                s.style.setProperty('--d', (2+Math.random()*4)+'s');
                field.appendChild(s);
            }
        }

        init();
    </script>
</body>
</html>
