<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Birth Pulse - Philips Purple Edition</title>
    <script src="https://d3js.org/d3.v7.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body, html {
            margin: 0; padding: 0; width: 100vw; height: 100vh;
            overflow: hidden; background-color: #02040a;
            font-family: 'Inter', sans-serif; color: white;
            cursor: default; touch-action: none;
        }

        /* UI LAYOUT */
        .ui-root {
            position: absolute; left: 5vw; top: 0; bottom: 0;
            width: 42vw; z-index: 500; pointer-events: none;
            display: flex; flex-direction: column; justify-content: center;
            gap: 2vh;
        }

        .philips-title { font-size: 3.2vh; font-weight: 900; color: #3b82f6; letter-spacing: 3px; text-transform: uppercase; }
        .main-heading { font-size: 5vh; color: #a855f7; font-weight: 800; line-height: 1.1; }
        
        .stats-box { pointer-events: auto; width: 100%; }
        .label { font-size: 2vh; color: #94a3b8; text-transform: uppercase; font-weight: 700; letter-spacing: 2px; }
        .count { font-size: 13vh; font-weight: 900; color: #fbbf24; line-height: 1; margin: 0.5vh 0; }
        
        .progress-container { width: 90%; margin-top: 10px; }
        .bar-wrapper { width: 100%; height: 12px; background: rgba(168, 85, 247, 0.1); border-radius: 10px; overflow: hidden; border: 1px solid rgba(168, 85, 247, 0.3); }
        .bar-fill { height: 100%; width: 0%; background: linear-gradient(90deg, #a855f7, #d8b4fe); box-shadow: 0 0 15px rgba(168, 85, 247, 0.5); }
        .time-labels { display: flex; justify-content: space-between; margin-top: 8px; font-weight: 800; font-size: 2.2vh; color: #a855f7; }
        
        #clock { color: #facc15; font-size: 3vh; font-weight: 800; display: block; text-align: center; margin-top: 1vh; }

        /* CANVAS */
        .canvas-container { position: absolute; left: 0; top: 0; width: 100vw; height: 100vh; z-index: 5; }
        #main-canvas { width: 100%; height: 100%; cursor: grab; }

        #loading { position: absolute; width: 100%; height: 100%; background: #000; display: flex; align-items: center; justify-content: center; z-index: 11000; color: #a855f7; font-size: 3vh; font-weight: 900; }
    </style>
</head>
<body>

    <div id="loading">OPTIMIZING VISUALS...</div>

    <div class="ui-root">
        <div class="header-box">
            <div class="philips-title">Philips</div>
            <h1 class="main-heading">Mother & Child Care<br>Womens Health</h1>
        </div>

        <div class="stats-box">
            <span class="label">Live Global Births Today</span>
            <div id="birthCount" class="count">0</div>
            <div class="progress-container">
                <div class="bar-wrapper"><div id="bar" class="bar-fill"></div></div>
                <div class="time-labels">
                    <span>00:00</span>
                    <span>24:00</span>
                </div>
                <span id="clock">00:00:00</span>
            </div>
        </div>
    </div>

    <div class="canvas-container"><canvas id="main-canvas"></canvas></div>

    <script>
        var BIRTH_RATE = 4.34, EARTH_ROT_SPD = 0.015, RESUME_DELAY = 3000, TARGET_TILT = -18;
        var worldGeo = null, flashingCountries = [];
        var canvas = document.getElementById("main-canvas"), context = canvas.getContext("2d");
        var w, h, rotX = 0, rotY = TARGET_TILT, lastT = Date.now(), lastIntT = Date.now(), isDragging = false;

        function setSizes() { w = window.innerWidth; h = window.innerHeight; canvas.width = w; canvas.height = h; }
        setSizes();
        
        var projection = d3.geoOrthographic().scale(h/1.95).translate([w*0.73, h*0.5]).clipAngle(90);
        var path = d3.geoPath(projection, context);

        canvas.addEventListener('mousedown', function(e) { isDragging = true; lastX = e.clientX; lastY = e.clientY; lastIntT = Date.now(); });
        window.addEventListener('mousemove', function(e) { 
            if (isDragging) { rotX += (e.clientX - lastX) * 0.25; rotY -= (e.clientY - lastY) * 0.25; lastX = e.clientX; lastY = e.clientY; lastIntT = Date.now(); }
        });
        window.addEventListener('mouseup', function() { isDragging = false; });

        function init() {
            d3.json("https://raw.githubusercontent.com/nvkelso/natural-earth-vector/master/geojson/ne_110m_admin_0_countries.geojson").then(function(data) {
                worldGeo = data;
                document.getElementById('loading').style.display='none';
                requestAnimationFrame(renderLoop);
                startSimulation();
            });
        }

        function renderLoop() {
            var now = Date.now(), dt = now - lastT; lastT = now;
            if (!isDragging && now - lastIntT > RESUME_DELAY) {
                rotX += EARTH_ROT_SPD * dt;
                rotY += (TARGET_TILT - rotY) * 0.04;
            }

            projection.rotate([rotX, rotY]);
            context.clearRect(0,0,w,h);
            var ex=w*0.73, ey=h*0.5, r=projection.scale();

            // 1. SUN LIGHT SOURCE
            var sTime = now * 0.00008, sx = ex + Math.cos(sTime)*(w*0.4), sy = ey + Math.sin(sTime)*(h*0.3);
            var sunG = context.createRadialGradient(sx, sy, 0, sx, sy, 100);
            sunG.addColorStop(0, "rgba(255, 255, 255, 0.9)");
            sunG.addColorStop(0.4, "rgba(168, 85, 247, 0.3)");
            sunG.addColorStop(1, "transparent");
            context.fillStyle = sunG; context.beginPath(); context.arc(sx, sy, 100, 0, 7); context.fill();

            // 2. ATMOSPHERE OUTER GLOW
            var atmoG = context.createRadialGradient(ex, ey, r, ex, ey, r + 60);
            atmoG.addColorStop(0, "rgba(168, 85, 247, 0.2)");
            atmoG.addColorStop(1, "transparent");
            context.fillStyle = atmoG; context.beginPath(); context.arc(ex, ey, r + 60, 0, 7); context.fill();

            // 3. OCEAN (High Contrast)
            var oG = context.createRadialGradient(ex-r/4, ey-r/4, r/10, ex, ey, r);
            oG.addColorStop(0, "#0f172a"); oG.addColorStop(1, "#02040a");
            context.fillStyle = oG; context.beginPath(); context.arc(ex, ey, r, 0, 7); context.fill();

            // 4. COUNTRIES (High Visibility)
            if (worldGeo) {
                context.beginPath(); path(worldGeo); 
                context.fillStyle = "#334155"; // Brightened landmass
                context.fill();
                context.strokeStyle = "rgba(148, 163, 184, 0.4)"; // Sharp borders
                context.lineWidth = 1; context.stroke();

                // BIRTH PULSE (Magenta/White)
                var currentNow = Date.now();
                flashingCountries.forEach((f, idx) => {
                    var age = currentNow - f.time;
                    if (age < 1500) {
                        context.save();
                        var alpha = 1 - (age/1500);
                        context.globalAlpha = alpha;
                        context.fillStyle = "#f472b6"; 
                        context.shadowBlur = 25 * alpha; context.shadowColor = "#ffffff";
                        context.beginPath(); path(f.feature); context.fill();
                        context.restore();
                    } else { flashingCountries.splice(idx, 1); }
                });
            }

            // 5. TERMINATOR SHADOW
            var eSA = Math.atan2(ey-sy, ex-sx);
            var eSh = context.createRadialGradient(ex + Math.cos(eSA)*r*0.6, ey + Math.sin(eSA)*r*0.6, 0, ex, ey, r);
            eSh.addColorStop(0, "transparent"); eSh.addColorStop(1, "rgba(0,0,0,0.7)");
            context.fillStyle = eSh; context.beginPath(); context.arc(ex, ey, r+1, 0, 7); context.fill();

            requestAnimationFrame(renderLoop);
        }

        function startSimulation() {
            setInterval(function() {
                var now = new Date();
                var start = new Date(now.getFullYear(), now.getMonth(), now.getDate()).getTime();
                var elapsed = (Date.now() - start) / 1000;
                document.getElementById('birthCount').innerText = Math.floor(elapsed * BIRTH_RATE).toLocaleString('de-DE');
                document.getElementById('clock').innerText = now.toLocaleTimeString('en-GB');
                document.getElementById('bar').style.width = (elapsed / 86400 * 100) + "%";

                if (worldGeo) {
                    var rf = worldGeo.features[Math.floor(Math.random() * worldGeo.features.length)];
                    flashingCountries.push({ feature: rf, time: Date.now() });
                }
            }, 1000 / (BIRTH_RATE / 1.8));
        }

        window.onresize = setSizes; init();
    </script>
</body>
</html>
