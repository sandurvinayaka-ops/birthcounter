<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Birth Pulse - UltraWide TV Edition</title>
    <script src="https://d3js.org/d3.v7.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body, html {
            margin: 0; padding: 0; width: 100vw; height: 100vh;
            overflow: hidden; background-color: #010204;
            font-family: 'Inter', sans-serif; color: white;
        }

        /* Adjusted for 5.3:1 Aspect Ratio */
        .branding-header {
            position: absolute; top: 5%; left: 3%;
            z-index: 1000;
        }
        .philips-title { font-size: 4vh; font-weight: 900; color: #3b82f6; letter-spacing: 4px; text-transform: uppercase; line-height: 1; }
        .main-heading { font-size: 5vh; color: #a855f7; font-weight: 800; margin-top: 0.5vh; }

        .ui-counter-root {
            position: absolute; left: 3%; bottom: 10%; 
            width: 40vw; z-index: 500;
            display: flex; flex-direction: column;
        }
        
        .label { font-size: 3vh; color: #a855f7; text-transform: uppercase; font-weight: 800; letter-spacing: 1px; }
        .count { 
            font-size: 22vh; font-weight: 900; color: #fbbf24; 
            line-height: 0.8; margin: 1vh 0;
            text-shadow: 0 0 30px rgba(251, 191, 36, 0.3); 
        }
        
        .progress-container { width: 100%; display: flex; align-items: center; gap: 20px; }
        .bar-wrapper { flex-grow: 1; height: 12px; background: rgba(255,255,255,0.05); border-radius: 10px; overflow: hidden; border: 1px solid rgba(168, 85, 247, 0.3); }
        .bar-fill { height: 100%; width: 0%; background: #fbbf24; box-shadow: 0 0 15px #fbbf24; }
        #clock { color: #fbbf24; font-size: 5vh; font-weight: 800; min-width: 120px; text-align: right; }

        .canvas-container { position: absolute; right: 0; top: 0; width: 55vw; height: 100vh; z-index: 5; }
        #main-canvas { width: 100%; height: 100%; }

        .star { position: absolute; background: white; border-radius: 50%; opacity: 0.5; }
    </style>
</head>
<body>

    <div class="branding-header">
        <div class="philips-title">Philips</div>
        <div class="main-heading">Mother & Child Care Women's Health</div>
    </div>

    <div class="ui-counter-root">
        <span class="label">Live Global Births Today</span>
        <div id="birthCount" class="count">0</div>
        <div class="progress-container">
            <div class="bar-wrapper"><div id="bar" class="bar-fill"></div></div>
            <div id="clock">00:00:00</div>
        </div>
    </div>

    <div id="starfield" class="absolute inset-0 z-0"></div>
    <div class="canvas-container"><canvas id="main-canvas"></canvas></div>

    <script>
        const BIRTH_RATE = 4.34;
        let worldGeo = null, flashingCountries = [], comets = [];
        const canvas = document.getElementById("main-canvas"), ctx = canvas.getContext("2d");
        let w, h, rotX = 0, lastT = 0;

        function resize() {
            w = canvas.parentElement.clientWidth;
            h = canvas.parentElement.clientHeight;
            canvas.width = w * window.devicePixelRatio;
            canvas.height = h * window.devicePixelRatio;
            ctx.scale(window.devicePixelRatio, window.devicePixelRatio);
        }
        window.onresize = resize;
        resize();

        // High visibility globe scale for narrow height
        const projection = d3.geoOrthographic().scale(h * 0.45).translate([w * 0.5, h * 0.5]).clipAngle(90);
        const path = d3.geoPath(projection, ctx);

        async function init() {
            const data = await d3.json("https://raw.githubusercontent.com/nvkelso/natural-earth-vector/master/geojson/ne_110m_admin_0_countries.geojson");
            worldGeo = data;
            createStars();
            requestAnimationFrame(render);
            startSim();
        }

        function render(now) {
            const dt = now - lastT;
            lastT = now;

            // Smoother rotation using float precision
            rotX += 0.008 * dt; 
            projection.rotate([rotX, -15]);

            ctx.clearRect(0, 0, w, h);
            const r = projection.scale();
            const cx = w * 0.5, cy = h * 0.5;

            // 1. Realistic Comets
            drawComets(dt);

            // 2. Solar Glow (Golden)
            const sunG = ctx.createRadialGradient(cx-r, cy-r, 0, cx-r, cy-r, r*1.5);
            sunG.addColorStop(0, "rgba(251, 191, 36, 0.15)");
            sunG.addColorStop(1, "transparent");
            ctx.fillStyle = sunG; ctx.fillRect(0,0,w,h);

            // 3. Globe Ocean
            const oceanG = ctx.createRadialGradient(cx-r/3, cy-r/3, r/5, cx, cy, r);
            oceanG.addColorStop(0, "#2563eb"); oceanG.addColorStop(1, "#020617");
            ctx.fillStyle = oceanG; ctx.beginPath(); ctx.arc(cx, cy, r, 0, Math.PI*2); ctx.fill();

            // 4. Landmasses
            if (worldGeo) {
                ctx.beginPath(); path(worldGeo);
                ctx.fillStyle = "#cbd5e1"; ctx.fill();
                ctx.strokeStyle = "rgba(255,255,255,0.2)"; ctx.lineWidth = 0.5; ctx.stroke();

                // 5. Birth Flashes
                const cTime = Date.now();
                flashingCountries.forEach((f, i) => {
                    const age = cTime - f.t;
                    if (age < 2000) {
                        ctx.save();
                        ctx.globalAlpha = 1 - (age/2000);
                        ctx.fillStyle = "#ff00ff";
                        ctx.shadowBlur = 20; ctx.shadowColor = "#ff00ff";
                        ctx.beginPath(); path(f.feature); ctx.fill();
                        ctx.restore();
                    } else flashingCountries.splice(i, 1);
                });
            }

            // 6. Atmospheric Edge
            const atmo = ctx.createRadialGradient(cx, cy, r, cx, cy, r+20);
            atmo.addColorStop(0, "rgba(59, 130, 246, 0.3)");
            atmo.addColorStop(1, "transparent");
            ctx.fillStyle = atmo; ctx.beginPath(); ctx.arc(cx, cy, r+20, 0, Math.PI*2); ctx.fill();

            requestAnimationFrame(render);
        }

        function drawComets(dt) {
            if (Math.random() < 0.02) comets.push({x:Math.random()*w, y:-20, v:0.2+Math.random()*0.3, l:1.0});
            comets.forEach((c, i) => {
                c.x -= c.v * dt; c.y += c.v * dt; c.l -= 0.0005 * dt;
                ctx.strokeStyle = `rgba(255,255,255,${c.l})`;
                ctx.lineWidth = 2; ctx.beginPath(); ctx.moveTo(c.x, c.y); ctx.lineTo(c.x+40, c.y-40); ctx.stroke();
                if (c.l <= 0) comets.splice(i, 1);
            });
        }

        function startSim() {
            setInterval(() => {
                const now = new Date();
                const start = new Date(now.getFullYear(), now.getMonth(), now.getDate()).getTime();
                const elapsed = (Date.now() - start) / 1000;
                document.getElementById('birthCount').innerText = Math.floor(elapsed * BIRTH_RATE).toLocaleString('de-DE');
                document.getElementById('clock').innerText = now.toLocaleTimeString('en-GB');
                document.getElementById('bar').style.width = (elapsed / 86400 * 100) + "%";
                
                if (worldGeo) {
                    const feat = worldGeo.features[Math.floor(Math.random() * worldGeo.features.length)];
                    flashingCountries.push({feature: feat, t: Date.now()});
                }
            }, 1000 / (BIRTH_RATE / 2));
        }

        function createStars() {
            const field = document.getElementById('starfield');
            for(let i=0; i<100; i++) {
                const s = document.createElement('div');
                s.className = 'star';
                const size = Math.random()*2;
                s.style.width = s.style.height = size+'px';
                s.style.left = Math.random()*100+'%'; s.style.top = Math.random()*100+'%';
                field.appendChild(s);
            }
        }

        init();
    </script>
</body>
</html>
