<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Birth Pulse - High Visibility Philips</title>
    <script src="https://d3js.org/d3.v7.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body, html {
            margin: 0; padding: 0; width: 100vw; height: 100vh;
            overflow: hidden; background-color: #010409;
            font-family: 'Inter', sans-serif; color: white;
            cursor: default; touch-action: none;
        }

        /* BRANDING - TOP LEFT */
        .branding-header {
            position: absolute; top: 3vh; left: 3vw;
            z-index: 1000; pointer-events: none;
        }
        .philips-title { font-size: 2.8vh; font-weight: 900; color: #3b82f6; letter-spacing: 3px; text-transform: uppercase; }
        .main-heading { font-size: 4vh; color: #a855f7; font-weight: 800; line-height: 1.1; }

        /* UI COUNTER - 80% SCALE CONTAINER */
        .ui-counter-root {
            position: absolute; left: 3vw; top: 40%; 
            width: 45vw; z-index: 500; pointer-events: none;
            display: flex; flex-direction: column; justify-content: center;
            transform: scale(0.8);
            transform-origin: left center;
        }
        
        /* 1.5X SIZE UPDATES */
        .label { 
            font-size: 3.3vh; /* Increased 1.5x from ~2.2vh */
            color: #a855f7;  /* Switched to Purple */
            text-transform: uppercase; 
            font-weight: 800; 
            letter-spacing: 2px;
            margin-bottom: 1vh;
            display: block;
        }
        .count { 
            font-size: 19.5vh; /* Increased 1.5x from ~13vh */
            font-weight: 900; 
            color: #fbbf24; 
            line-height: 0.9; 
            margin: 0; 
            text-shadow: 0 0 40px rgba(251, 191, 36, 0.5); 
        }
        
        .progress-container { width: 100%; margin-top: 20px; }
        .bar-wrapper { width: 100%; height: 16px; background: rgba(255,255,255,0.05); border-radius: 10px; overflow: hidden; border: 1px solid rgba(168, 85, 247, 0.4); }
        .bar-fill { height: 100%; width: 0%; background: linear-gradient(90deg, #fbbf24, #f59e0b); box-shadow: 0 0 20px rgba(251, 191, 36, 0.6); }
        .time-labels { display: flex; justify-content: space-between; margin-top: 8px; font-weight: 800; font-size: 2.5vh; color: #a855f7; }
        
        #clock { color: #fbbf24; font-size: 4vh; font-weight: 800; display: block; text-align: center; margin-top: 2vh; letter-spacing: 3px; }

        /* SPACE ENVIRONMENT */
        .stars-container { position: absolute; width: 100%; height: 100%; z-index: 1; pointer-events: none; }
        .star { position: absolute; background: white; border-radius: 50%; animation: blink var(--t) infinite ease-in-out; }
        @keyframes blink { 0%, 100% { opacity: 0.2; transform: scale(0.8); } 50% { opacity: 1; transform: scale(1.3); box-shadow: 0 0 10px #fff; } }

        .canvas-container { position: absolute; left: 0; top: 0; width: 100vw; height: 100vh; z-index: 5; }
        #main-canvas { width: 100%; height: 100%; }
    </style>
</head>
<body>

    <div class="branding-header">
        <div class="philips-title">Philips</div>
        <h1 class="main-heading">Mother & Child Care<br>Womens Health</h1>
    </div>

    <div class="ui-counter-root">
        <span class="label">Live Global Births Today</span>
        <div id="birthCount" class="count">0</div>
        <div class="progress-container">
            <div class="bar-wrapper"><div id="bar" class="bar-fill"></div></div>
            <div class="time-labels">
                <span>00:00</span>
                <span>24:00</span>
            </div>
            <span id="clock">00:00:00</span>
        </div>
    </div>

    <div class="stars-container" id="starfield"></div>
    <div class="canvas-container"><canvas id="main-canvas"></canvas></div>

    <script>
        var BIRTH_RATE = 4.34, EARTH_ROT_SPD = 0.018, TARGET_TILT = -18;
        var worldGeo = null, flashingCountries = [], comets = [];
        var canvas = document.getElementById("main-canvas"), context = canvas.getContext("2d");
        var w, h, rotX = 0, rotY = TARGET_TILT, lastT = Date.now();

        function setSizes() { w = window.innerWidth; h = window.innerHeight; canvas.width = w; canvas.height = h; }
        setSizes();
        
        var projection = d3.geoOrthographic().scale(h/1.8).translate([w*0.75, h*0.55]).clipAngle(90);
        var path = d3.geoPath(projection, context);

        function init() {
            d3.json("https://raw.githubusercontent.com/nvkelso/natural-earth-vector/master/geojson/ne_110m_admin_0_countries.geojson").then(function(data) {
                worldGeo = data;
                requestAnimationFrame(renderLoop);
                startSimulation();
            });
        }

        function renderLoop() {
            var now = Date.now(), dt = now - lastT; lastT = now;
            rotX += EARTH_ROT_SPD * dt;
            projection.rotate([rotX, rotY]);
            context.clearRect(0,0,w,h);
            var ex=w*0.75, ey=h*0.55, r=projection.scale();

            updateComets(context);

            // GOLDEN SUN
            var sTime = now * 0.0001, sx = ex + Math.cos(sTime)*(w*0.4), sy = ey + Math.sin(sTime)*(h*0.3);
            var sunG = context.createRadialGradient(sx, sy, 0, sx, sy, 120);
            sunG.addColorStop(0, "#ffffff"); sunG.addColorStop(0.3, "#fbbf24"); sunG.addColorStop(1, "transparent");
            context.fillStyle = sunG; context.beginPath(); context.arc(sx, sy, 110, 0, 7); context.fill();

            // OCEAN & GLOBE
            var oG = context.createRadialGradient(ex-r/4, ey-r/4, r/5, ex, ey, r);
            oG.addColorStop(0, "#2563eb"); oG.addColorStop(0.6, "#1e3a8a"); oG.addColorStop(1, "#0f172a");
            context.fillStyle = oG; context.beginPath(); context.arc(ex, ey, r, 0, 7); context.fill();

            if (worldGeo) {
                context.beginPath(); path(worldGeo); 
                context.fillStyle = "#cbd5e1"; context.fill();
                context.strokeStyle = "rgba(255, 255, 255, 0.6)"; context.lineWidth = 1; context.stroke();

                var currentNow = Date.now();
                flashingCountries.forEach((f, idx) => {
                    var age = currentNow - f.time;
                    if (age < 1500) {
                        context.save();
                        context.globalAlpha = 1 - (age/1500);
                        context.fillStyle = "#ff00ff"; context.shadowBlur = 40; context.shadowColor = "#ffffff";
                        context.beginPath(); path(f.feature); context.fill();
                        context.restore();
                    } else { flashingCountries.splice(idx, 1); }
                });
            }

            // SHADOW LAYER
            var eSA = Math.atan2(ey-sy, ex-sx);
            var eSh = context.createRadialGradient(ex + Math.cos(eSA)*r*0.6, ey + Math.sin(eSA)*r*0.6, 0, ex, ey, r);
            eSh.addColorStop(0, "transparent"); eSh.addColorStop(1, "rgba(0,0,0,0.6)");
            context.fillStyle = eSh; context.beginPath(); context.arc(ex, ey, r+1, 0, 7); context.fill();

            requestAnimationFrame(renderLoop);
        }

        function updateComets(ctx) {
            if (Math.random() < 0.01) comets.push({ x: Math.random()*w, y: -50, v: 5+Math.random()*7, angle: Math.PI/4, len: 50+Math.random()*50, life: 1.0 });
            comets.forEach((c, i) => {
                c.x -= c.v; c.y += c.v; c.life -= 0.005;
                ctx.strokeStyle = `rgba(255, 255, 255, ${c.life})`; ctx.lineWidth = 2; ctx.beginPath();
                ctx.moveTo(c.x, c.y); ctx.lineTo(c.x + c.len, c.y - c.len); ctx.stroke();
                if (c.life <= 0) comets.splice(i, 1);
            });
        }

        function startSimulation() {
            setInterval(function() {
                var now = new Date(), start = new Date(now.getFullYear(), now.getMonth(), now.getDate()).getTime();
                var elapsed = (Date.now() - start) / 1000;
                document.getElementById('birthCount').innerText = Math.floor(elapsed * BIRTH_RATE).toLocaleString('de-DE');
                document.getElementById('clock').innerText = now.toLocaleTimeString('en-GB');
                document.getElementById('bar').style.width = (elapsed / 86400 * 100) + "%";

                if (worldGeo) {
                    var rf = worldGeo.features[Math.floor(Math.random() * worldGeo.features.length)];
                    flashingCountries.push({ feature: rf, time: Date.now() });
                }
            }, 1000 / (BIRTH_RATE / 1.5));
        }

        var field = document.getElementById('starfield');
        for (var i = 0; i < 150; i++) {
            var s = document.createElement('div'); s.className = 'star';
            var size = Math.random() * 3;
            s.style.width = s.style.height = size + 'px';
            s.style.left = Math.random() * 100 + '%'; s.style.top = Math.random() * 100 + '%';
            s.style.setProperty('--t', (1.5 + Math.random() * 3) + 's');
            field.appendChild(s);
        }

        window.onresize = setSizes; init();
    </script>
</body>
</html>
