<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Birth Pulse - Philips Gold & Purple</title>
    <script src="https://d3js.org/d3.v7.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body, html {
            margin: 0; padding: 0; width: 100vw; height: 100vh;
            overflow: hidden; background-color: #010409;
            font-family: 'Inter', sans-serif; color: white;
            cursor: default; touch-action: none;
        }

        .ui-root {
            position: absolute; left: 5vw; top: 0; bottom: 0;
            width: 42vw; z-index: 500; pointer-events: none;
            display: flex; flex-direction: column; justify-content: center;
            gap: 2vh;
        }

        .philips-title { font-size: 3.2vh; font-weight: 900; color: #3b82f6; letter-spacing: 3px; text-transform: uppercase; }
        .main-heading { font-size: 5vh; color: #a855f7; font-weight: 800; line-height: 1.1; text-shadow: 0 0 20px rgba(168, 85, 247, 0.3); }
        
        .stats-box { pointer-events: auto; width: 100%; }
        .label { font-size: 2.2vh; color: #94a3b8; text-transform: uppercase; font-weight: 700; letter-spacing: 2px; }
        .count { font-size: 13.5vh; font-weight: 900; color: #fbbf24; line-height: 1; margin: 0.5vh 0; text-shadow: 0 0 30px rgba(251, 191, 36, 0.4); }
        
        .progress-container { width: 92%; margin-top: 10px; }
        .bar-wrapper { width: 100%; height: 14px; background: rgba(255,255,255,0.05); border-radius: 10px; overflow: hidden; border: 1px solid rgba(168, 85, 247, 0.4); }
        .bar-fill { height: 100%; width: 0%; background: linear-gradient(90deg, #fbbf24, #f59e0b); box-shadow: 0 0 20px rgba(251, 191, 36, 0.6); }
        .time-labels { display: flex; justify-content: space-between; margin-top: 8px; font-weight: 800; font-size: 2.2vh; color: #a855f7; }
        
        #clock { color: #fbbf24; font-size: 3.2vh; font-weight: 800; display: block; text-align: center; margin-top: 1vh; letter-spacing: 2px; }

        .canvas-container { position: absolute; left: 0; top: 0; width: 100vw; height: 100vh; z-index: 5; }
        #main-canvas { width: 100%; height: 100%; cursor: grab; }

        #loading { position: absolute; width: 100%; height: 100%; background: #000; display: flex; align-items: center; justify-content: center; z-index: 11000; color: #fbbf24; font-size: 3.5vh; font-weight: 900; }
    </style>
</head>
<body>

    <div id="loading">IGNITING SOLAR CORE...</div>

    <div class="ui-root">
        <div class="header-box">
            <div class="philips-title">Philips</div>
            <h1 class="main-heading">Mother & Child Care<br>Womens Health</h1>
        </div>

        <div class="stats-box">
            <span class="label">Live Global Births Today</span>
            <div id="birthCount" class="count">0</div>
            <div class="progress-container">
                <div class="bar-wrapper"><div id="bar" class="bar-fill"></div></div>
                <div class="time-labels">
                    <span>00:00</span>
                    <span>24:00</span>
                </div>
                <span id="clock">00:00:00</span>
            </div>
        </div>
    </div>

    <div class="canvas-container"><canvas id="main-canvas"></canvas></div>

    <script>
        var BIRTH_RATE = 4.34, EARTH_ROT_SPD = 0.018, RESUME_DELAY = 2500, TARGET_TILT = -18;
        var worldGeo = null, flashingCountries = [];
        var canvas = document.getElementById("main-canvas"), context = canvas.getContext("2d");
        var w, h, rotX = 0, rotY = TARGET_TILT, lastT = Date.now(), lastIntT = Date.now(), isDragging = false;

        function setSizes() { w = window.innerWidth; h = window.innerHeight; canvas.width = w; canvas.height = h; }
        setSizes();
        
        // Increased scale for better visibility (h/1.85)
        var projection = d3.geoOrthographic().scale(h/1.85).translate([w*0.73, h*0.5]).clipAngle(90);
        var path = d3.geoPath(projection, context);

        canvas.addEventListener('mousedown', function(e) { isDragging = true; lastX = e.clientX; lastY = e.clientY; lastIntT = Date.now(); });
        window.addEventListener('mousemove', function(e) { 
            if (isDragging) { rotX += (e.clientX - lastX) * 0.25; rotY -= (e.clientY - lastY) * 0.25; lastX = e.clientX; lastY = e.clientY; lastIntT = Date.now(); }
        });
        window.addEventListener('mouseup', function() { isDragging = false; });

        function init() {
            d3.json("https://raw.githubusercontent.com/nvkelso/natural-earth-vector/master/geojson/ne_110m_admin_0_countries.geojson").then(function(data) {
                worldGeo = data;
                document.getElementById('loading').style.display='none';
                requestAnimationFrame(renderLoop);
                startSimulation();
            });
        }

        function renderLoop() {
            var now = Date.now(), dt = now - lastT; lastT = now;
            if (!isDragging && now - lastIntT > RESUME_DELAY) {
                rotX += EARTH_ROT_SPD * dt;
                rotY += (TARGET_TILT - rotY) * 0.05;
            }

            projection.rotate([rotX, rotY]);
            context.clearRect(0,0,w,h);
            var ex=w*0.73, ey=h*0.5, r=projection.scale();

            // 1. GOLDEN SUN LIGHT SOURCE
            var sTime = now * 0.0001, sx = ex + Math.cos(sTime)*(w*0.42), sy = ey + Math.sin(sTime)*(h*0.32);
            context.save();
            var sunG = context.createRadialGradient(sx, sy, 0, sx, sy, 120);
            sunG.addColorStop(0, "#ffffff");
            sunG.addColorStop(0.2, "#fbbf24"); // Golden Core
            sunG.addColorStop(0.5, "rgba(245, 158, 11, 0.4)");
            sunG.addColorStop(1, "transparent");
            context.fillStyle = sunG;
            context.shadowBlur = 60; context.shadowColor = "#fbbf24";
            context.beginPath(); context.arc(sx, sy, 110, 0, 7); context.fill();
            context.restore();

            // 2. ATMOSPHERE BORDER GLOW
            var atmoG = context.createRadialGradient(ex, ey, r, ex, ey, r + 70);
            atmoG.addColorStop(0, "rgba(168, 85, 247, 0.3)");
            atmoG.addColorStop(1, "transparent");
            context.fillStyle = atmoG; context.beginPath(); context.arc(ex, ey, r + 70, 0, 7); context.fill();

            // 3. OCEAN (Rich Deep Navy)
            var oG = context.createRadialGradient(ex-r/4, ey-r/4, r/10, ex, ey, r);
            oG.addColorStop(0, "#0f172a"); oG.addColorStop(1, "#020617");
            context.fillStyle = oG; context.beginPath(); context.arc(ex, ey, r, 0, 7); context.fill();

            // 4. COUNTRIES (High Visibility Landmass)
            if (worldGeo) {
                context.beginPath(); path(worldGeo); 
                context.fillStyle = "#475569"; // Slate Grey/Teal for contrast
                context.fill();
                context.strokeStyle = "rgba(255, 255, 255, 0.5)"; // Bright Borders
                context.lineWidth = 1.2; context.stroke();

                // BIRTH PULSE (Neon Magenta)
                var currentNow = Date.now();
                flashingCountries.forEach((f, idx) => {
                    var age = currentNow - f.time;
                    if (age < 1800) {
                        context.save();
                        var alpha = 1 - (age/1800);
                        context.globalAlpha = alpha;
                        context.fillStyle = "#e879f9"; // Bright Magenta
                        context.shadowBlur = 30 * alpha; context.shadowColor = "#ffffff";
                        context.beginPath(); path(f.feature); context.fill();
                        context.restore();
                    } else { flashingCountries.splice(idx, 1); }
                });
            }

            // 5. DYNAMIC SHADOW
            var eSA = Math.atan2(ey-sy, ex-sx);
            var eSh = context.createRadialGradient(ex + Math.cos(eSA)*r*0.6, ey + Math.sin(eSA)*r*0.6, 0, ex, ey, r);
            eSh.addColorStop(0, "transparent"); eSh.addColorStop(1, "rgba(0,0,0,0.75)");
            context.fillStyle = eSh; context.beginPath(); context.arc(ex, ey, r+1, 0, 7); context.fill();

            requestAnimationFrame(renderLoop);
        }

        function startSimulation() {
            setInterval(function() {
                var now = new Date();
                var start = new Date(now.getFullYear(), now.getMonth(), now.getDate()).getTime();
                var elapsed = (Date.now() - start) / 1000;
                document.getElementById('birthCount').innerText = Math.floor(elapsed * BIRTH_RATE).toLocaleString('de-DE');
                document.getElementById('clock').innerText = now.toLocaleTimeString('en-GB');
                document.getElementById('bar').style.width = (elapsed / 86400 * 100) + "%";

                if (worldGeo) {
                    var rf = worldGeo.features[Math.floor(Math.random() * worldGeo.features.length)];
                    flashingCountries.push({ feature: rf, time: Date.now() });
                }
            }, 1000 / (BIRTH_RATE / 1.5));
        }

        window.onresize = setSizes; init();
    </script>
</body>
</html>
