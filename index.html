<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Birth Pulse - Philips Wide TV Master</title>
    <script src="https://d3js.org/d3.v7.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body, html {
            margin: 0; padding: 0; width: 100vw; height: 100vh;
            overflow: hidden; background-color: #010204;
            font-family: 'Inter', sans-serif; color: white;
        }

        /* BRANDING - TOP LEFT */
        .branding-header {
            position: absolute; top: 6%; left: 3%;
            z-index: 1000;
        }
        .philips-title { font-size: 3.5vh; font-weight: 900; color: #3b82f6; letter-spacing: 4px; text-transform: uppercase; line-height: 1; }
        .main-heading { font-size: 4.5vh; color: #a855f7; font-weight: 800; margin-top: 0.5vh; text-shadow: 0 0 15px rgba(168, 85, 247, 0.4); }

        /* UI COUNTER - CENTERED LEFT */
        .ui-counter-root {
            position: absolute; left: 3%; top: 45%; 
            width: 42vw; z-index: 500;
            display: flex; flex-direction: column;
            transform: translateY(-50%);
        }
        
        .label { font-size: 2.8vh; color: #a855f7; text-transform: uppercase; font-weight: 800; letter-spacing: 1px; }
        .count { 
            font-size: 20vh; font-weight: 900; color: #fbbf24; 
            line-height: 0.85; margin: 1vh 0;
            text-shadow: 0 0 35px rgba(251, 191, 36, 0.35); 
        }
        
        .progress-section { width: 100%; margin-top: 1vh; position: relative; }
        .bar-wrapper { width: 100%; height: 14px; background: rgba(255,255,255,0.05); border-radius: 10px; overflow: hidden; border: 1px solid rgba(168, 85, 247, 0.3); }
        .bar-fill { height: 100%; width: 0%; background: #fbbf24; box-shadow: 0 0 15px #fbbf24; }
        
        /* TIME LABELS & CENTER CLOCK */
        .time-meta { display: flex; justify-content: space-between; align-items: flex-start; margin-top: 8px; font-weight: 800; font-size: 2.5vh; color: #a855f7; }
        #clock { color: #fbbf24; font-size: 4.5vh; font-weight: 800; margin-top: -0.5vh; letter-spacing: 2px; }

        .canvas-container { position: absolute; right: 2%; top: 0; width: 50vw; height: 100vh; z-index: 5; }
        #main-canvas { width: 100%; height: 100%; }

        .star { position: absolute; background: white; border-radius: 50%; animation: twinkle var(--d) infinite ease-in-out; }
        @keyframes twinkle { 0%, 100% { opacity: 0.2; } 50% { opacity: 0.8; } }
    </style>
</head>
<body>

    <div style="position: absolute; width: 300px; height: 300px; background: radial-gradient(circle, rgba(251,191,36,0.3) 0%, transparent 70%); right: 5%; top: 5%; border-radius: 50%; filter: blur(40px); z-index: 1;"></div>

    <div class="branding-header">
        <div class="philips-title">Philips</div>
        <div class="main-heading">Mother & Child Care Women's Health</div>
    </div>

    <div class="ui-counter-root">
        <span class="label">Live Global Births Today</span>
        <div id="birthCount" class="count">0</div>
        
        <div class="progress-section">
            <div class="bar-wrapper"><div id="bar" class="bar-fill"></div></div>
            <div class="time-meta">
                <span>00:00</span>
                <div id="clock">00:00:00</div>
                <span>24:00</span>
            </div>
        </div>
    </div>

    <div id="starfield" class="absolute inset-0 z-0"></div>
    <div class="canvas-container"><canvas id="main-canvas"></canvas></div>

    <script>
        const BIRTH_RATE = 4.34;
        let worldGeo = null, flashingCountries = [], comets = [];
        const canvas = document.getElementById("main-canvas"), ctx = canvas.getContext("2d");
        let w, h, rotX = 0, lastT = 0;

        function resize() {
            w = canvas.parentElement.clientWidth;
            h = canvas.parentElement.clientHeight;
            canvas.width = w * window.devicePixelRatio;
            canvas.height = h * window.devicePixelRatio;
            ctx.scale(window.devicePixelRatio, window.devicePixelRatio);
        }
        window.onresize = resize;
        resize();

        const projection = d3.geoOrthographic().scale(h * 0.44).translate([w * 0.5, h * 0.52]).clipAngle(90);
        const path = d3.geoPath(projection, ctx);

        async function init() {
            const data = await d3.json("https://raw.githubusercontent.com/nvkelso/natural-earth-vector/master/geojson/ne_110m_admin_0_countries.geojson");
            worldGeo = data;
            createStars();
            requestAnimationFrame(render);
            startSim();
        }

        function render(now) {
            const dt = now - lastT;
            lastT = now;

            rotX += 0.007 * dt; 
            projection.rotate([rotX, -15]);

            ctx.clearRect(0, 0, w, h);
            const r = projection.scale();
            const cx = w * 0.5, cy = h * 0.52;

            drawRealisticComets(dt);

            // Realistic Golden Sun Source
            const sunX = w * 0.8, sunY = h * 0.2;
            const sunG = ctx.createRadialGradient(sunX, sunY, 0, sunX, sunY, 150);
            sunG.addColorStop(0, "rgba(255, 255, 255, 0.9)");
            sunG.addColorStop(0.2, "#fbbf24");
            sunG.addColorStop(1, "transparent");
            ctx.fillStyle = sunG; ctx.beginPath(); ctx.arc(sunX, sunY, 100, 0, 7); ctx.fill();

            // Globe Ocean
            const oceanG = ctx.createRadialGradient(cx-r/3, cy-r/3, r/5, cx, cy, r);
            oceanG.addColorStop(0, "#2563eb"); oceanG.addColorStop(1, "#020617");
            ctx.fillStyle = oceanG; ctx.beginPath(); ctx.arc(cx, cy, r, 0, Math.PI*2); ctx.fill();

            if (worldGeo) {
                ctx.beginPath(); path(worldGeo);
                ctx.fillStyle = "#cbd5e1"; ctx.fill();
                ctx.strokeStyle = "rgba(255,255,255,0.4)"; ctx.lineWidth = 0.5; ctx.stroke();

                const cTime = Date.now();
                flashingCountries.forEach((f, i) => {
                    const age = cTime - f.t;
                    if (age < 1800) {
                        ctx.save();
                        ctx.globalAlpha = 1 - (age/1800);
                        ctx.fillStyle = "#ff00ff";
                        ctx.shadowBlur = 30; ctx.shadowColor = "#ff00ff";
                        ctx.beginPath(); path(f.feature); ctx.fill();
                        ctx.restore();
                    } else flashingCountries.splice(i, 1);
                });
            }

            // Terminator Shadow (Calculated relative to Sun)
            const angleToSun = Math.atan2(sunY - cy, sunX - cx);
            const shadowG = ctx.createRadialGradient(cx + Math.cos(angleToSun+Math.PI)*r*0.4, cy + Math.sin(angleToSun+Math.PI)*r*0.4, 0, cx, cy, r);
            shadowG.addColorStop(0, "transparent");
            shadowG.addColorStop(1, "rgba(0,0,0,0.7)");
            ctx.fillStyle = shadowG; ctx.beginPath(); ctx.arc(cx, cy, r, 0, 7); ctx.fill();

            requestAnimationFrame(render);
        }

        function drawRealisticComets(dt) {
            if (Math.random() < 0.015) comets.push({x:Math.random()*w, y:-50, vx:-(2+Math.random()*4), vy:2+Math.random()*4, life:1.0});
            comets.forEach((c, i) => {
                c.x += c.vx; c.y += c.vy; c.life -= 0.005;
                
                // Comet Head
                ctx.fillStyle = `rgba(255,255,255,${c.life})`;
                ctx.beginPath(); ctx.arc(c.x, c.y, 2, 0, 7); ctx.fill();

                // Multi-stage realistic tail
                const tailGrad = ctx.createLinearGradient(c.x, c.y, c.x - c.vx*15, c.y - c.vy*15);
                tailGrad.addColorStop(0, `rgba(255,255,255,${c.life*0.6})`);
                tailGrad.addColorStop(0.5, `rgba(59,130,246,${c.life*0.2})`);
                tailGrad.addColorStop(1, "transparent");
                ctx.strokeStyle = tailGrad; ctx.lineWidth = 2; ctx.beginPath(); ctx.moveTo(c.x, c.y); ctx.lineTo(c.x-c.vx*15, c.y-c.vy*15); ctx.stroke();

                if (c.life <= 0) comets.splice(i, 1);
            });
        }

        function startSim() {
            setInterval(() => {
                const now = new Date();
                const start = new Date(now.getFullYear(), now.getMonth(), now.getDate()).getTime();
                const elapsed = (Date.now() - start) / 1000;
                document.getElementById('birthCount').innerText = Math.floor(elapsed * BIRTH_RATE).toLocaleString('de-DE');
                document.getElementById('clock').innerText = now.toLocaleTimeString('en-GB');
                document.getElementById('bar').style.width = (elapsed / 86400 * 100) + "%";
                
                if (worldGeo) {
                    const feat = worldGeo.features[Math.floor(Math.random() * worldGeo.features.length)];
                    flashingCountries.push({feature: feat, t: Date.now()});
                }
            }, 1000 / (BIRTH_RATE / 1.5));
        }

        function createStars() {
            const field = document.getElementById('starfield');
            for(let i=0; i<150; i++) {
                const s = document.createElement('div');
                s.className = 'star';
                const size = Math.random()*2.5;
                s.style.width = s.style.height = size+'px';
                s.style.left = Math.random()*100+'%'; s.style.top = Math.random()*100+'%';
                s.style.setProperty('--d', (2+Math.random()*4)+'s');
                field.appendChild(s);
            }
        }

        init();
    </script>
</body>
</html>
