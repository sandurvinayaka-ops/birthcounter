<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Philips Birth Pulse - cinematic UltraWide</title>
    <script src="https://d3js.org/d3.v7.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body, html {
            margin: 0; padding: 0; width: 100vw; height: 100vh;
            overflow: hidden; background-color: #000205;
            font-family: 'Inter', sans-serif; color: white;
        }

        .branding-header { position: absolute; top: 6%; left: 3%; z-index: 1000; }
        .philips-title { font-size: 3.5vh; font-weight: 900; color: #3b82f6; letter-spacing: 4px; text-transform: uppercase; }
        .main-heading { font-size: 4.5vh; color: #a855f7; font-weight: 800; margin-top: 0.5vh; }

        .ui-group {
            position: absolute; left: 3%; top: 58%; 
            z-index: 500; transform: translateY(-50%);
            display: flex; flex-direction: column;
            width: fit-content;
            max-width: 38vw; 
        }

        .label { font-size: 2.8vh; color: #a855f7; text-transform: uppercase; font-weight: 800; }
        
        .count { 
            font-size: 28vh; font-weight: 900; color: #fbbf24; 
            line-height: 0.8; margin: 0.2vh 0; 
            text-shadow: 0 0 50px rgba(251, 191, 36, 0.4); 
            font-variant-numeric: tabular-nums;
            white-space: nowrap;
        }
        
        .progress-section { width: 100%; margin-top: 1.5vh; }
        .bar-wrapper { width: 100%; height: 22px; background: rgba(255,255,255,0.05); border-radius: 12px; overflow: hidden; border: 1.5px solid rgba(168, 85, 247, 0.4); }
        .bar-fill { height: 100%; width: 0%; background: #fbbf24; box-shadow: 0 0 20px #fbbf24; }
        
        .time-meta { display: flex; justify-content: space-between; align-items: flex-start; margin-top: 10px; font-weight: 800; font-size: 2.6vh; color: #a855f7; }
        #clock { color: #fbbf24; font-size: 5vh; font-weight: 900; width: 100%; text-align: center; margin-top: 1.5vh; }

        .canvas-container { position: absolute; left: 0; top: 0; width: 100vw; height: 100vh; z-index: 5; pointer-events: none; }
        #main-canvas { width: 100%; height: 100%; }
    </style>
</head>
<body>

    <div class="branding-header">
        <div class="philips-title">Philips</div>
        <div class="main-heading">Mother & Child Care Women's Health</div>
    </div>

    <div class="ui-group">
        <span class="label">Live Global Births Today</span>
        <div id="birthCount" class="count">000.000</div>
        
        <div class="progress-section">
            <div class="bar-wrapper"><div id="bar" class="bar-fill"></div></div>
            <div class="time-meta">
                <span>00:00</span>
                <span>24:00</span>
            </div>
            <div id="clock">00:00:00</div>
        </div>
    </div>

    <div class="canvas-container"><canvas id="main-canvas"></canvas></div>

    <script>
        const BIRTH_RATE = 4.34;
        let worldGeo = null, flashingCountries = [], comets = [];
        const canvas = document.getElementById("main-canvas"), ctx = canvas.getContext("2d");
        let rotX = 0, lastTime = performance.now(); 

        function resize() {
            canvas.width = window.innerWidth * window.devicePixelRatio;
            canvas.height = window.innerHeight * window.devicePixelRatio;
            ctx.scale(window.devicePixelRatio, window.devicePixelRatio);
        }
        window.onresize = resize;
        resize();

        // GLOBE MOVED FURTHER LEFT TO ENSURE FULL VISIBILITY (0.68)
        const projection = d3.geoOrthographic()
            .scale(window.innerHeight * 0.45)
            .translate([window.innerWidth * 0.68, window.innerHeight * 0.52])
            .clipAngle(90);
        const path = d3.geoPath(projection, ctx);

        async function init() {
            worldGeo = await d3.json("https://raw.githubusercontent.com/nvkelso/natural-earth-vector/master/geojson/ne_110m_admin_0_countries.geojson");
            requestAnimationFrame(renderLoop);
            startDataSim();
        }

        function renderLoop(currentTime) {
            const dt = currentTime - lastTime;
            lastTime = currentTime;

            rotX += 0.006 * dt; 
            projection.rotate([rotX, -10]);

            const w = window.innerWidth, h = window.innerHeight;
            ctx.clearRect(0, 0, w, h);
            
            const r = projection.scale();
            const cx = w * 0.68, cy = h * 0.52;

            // LARGER, SMOOTHER BACKGROUND OBJECTS
            const sunAngle = currentTime * 0.00008;
            drawPlanet(cx, cy, r * 2.6, sunAngle, 30, "#fbbf24", 1.5); // Sun
            drawPlanet(cx, cy, r * 1.9, -sunAngle * 1.5, -15, "#e3bb76", 0.5); // Large Orbiting Planet

            updateComets(ctx, dt, w, h);

            // GLOBE
            const ocean = ctx.createRadialGradient(cx-r/3, cy-r/3, r/5, cx, cy, r);
            ocean.addColorStop(0, "#1e40af"); ocean.addColorStop(1, "#020617");
            ctx.fillStyle = ocean; ctx.beginPath(); ctx.arc(cx, cy, r, 0, Math.PI*2); ctx.fill();

            if (worldGeo) {
                ctx.beginPath(); path(worldGeo);
                ctx.fillStyle = "#ffffff"; ctx.fill();
                ctx.strokeStyle = "rgba(0,0,0,0.2)"; ctx.lineWidth = 0.5; ctx.stroke();

                const nowMs = Date.now();
                for (let i = flashingCountries.length - 1; i >= 0; i--) {
                    const f = flashingCountries[i];
                    const age = nowMs - f.t;
                    if (age < 2000) {
                        ctx.save();
                        ctx.globalAlpha = Math.max(0, 1 - (age/2000));
                        ctx.fillStyle = "#ff00ff";
                        ctx.shadowBlur = 35; ctx.shadowColor = "#ff00ff";
                        ctx.beginPath(); path(f.feature); ctx.fill();
                        ctx.restore();
                    } else { flashingCountries.splice(i, 1); }
                }
            }

            // LIGHTING
            const shadow = ctx.createRadialGradient(cx + Math.cos(sunAngle+Math.PI)*r*0.6, cy+Math.sin(sunAngle+Math.PI)*r*0.4, 0, cx, cy, r);
            shadow.addColorStop(0, "transparent"); shadow.addColorStop(1, "rgba(0,0,0,0.8)");
            ctx.fillStyle = shadow; ctx.beginPath(); ctx.arc(cx, cy, r, 0, 7); ctx.fill();

            requestAnimationFrame(renderLoop);
        }

        function drawPlanet(cx, cy, dist, angle, tilt, color, scale) {
            const x = cx + Math.cos(angle) * dist;
            const y = cy + Math.sin(angle) * (dist * 0.25) + tilt;
            const g = ctx.createRadialGradient(x, y, 0, x, y, 70 * scale);
            g.addColorStop(0, "white"); g.addColorStop(0.2, color); g.addColorStop(1, "transparent");
            ctx.fillStyle = g; ctx.beginPath(); ctx.arc(x, y, 110 * scale, 0, 7); ctx.fill();
        }

        function updateComets(ctx, dt, w, h) {
            if (Math.random() < 0.012) {
                comets.push({ x: w + 100, y: Math.random() * h, vx: -(0.5 + Math.random() * 0.6), vy: (Math.random() - 0.5) * 0.1, life: 1.0, size: 2.5 });
            }
            for (let i = comets.length - 1; i >= 0; i--) {
                const c = comets[i];
                c.x += c.vx * dt; c.y += c.vy * dt; c.life -= 0.0004 * dt;
                const grad = ctx.createLinearGradient(c.x, c.y, c.x + 220, c.y);
                grad.addColorStop(0, `rgba(255,255,255,${c.life})`); grad.addColorStop(1, "transparent");
                ctx.strokeStyle = grad; ctx.lineWidth = c.size; ctx.beginPath(); ctx.moveTo(c.x, c.y); ctx.lineTo(c.x+220, c.y); ctx.stroke();
                if (c.x < -300 || c.life <= 0) comets.splice(i, 1);
            }
        }

        function startDataSim() {
            setInterval(() => {
                const now = new Date();
                const start = new Date(now.getFullYear(), now.getMonth(), now.getDate()).getTime();
                const elapsed = (Date.now() - start) / 1000;
                document.getElementById('birthCount').innerText = Math.floor(elapsed * BIRTH_RATE).toLocaleString('de-DE');
                document.getElementById('clock').innerText = now.toLocaleTimeString('en-GB');
                document.getElementById('bar').style.width = (elapsed / 86400 * 100) + "%";
                if (worldGeo) {
                    const feat = worldGeo.features[Math.floor(Math.random() * worldGeo.features.length)];
                    flashingCountries.push({feature: feat, t: Date.now()});
                }
            }, 800);
        }

        init();
    </script>
</body>
</html>
