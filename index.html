<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Birth Pulse - Cinematic TV Pro V96 (Widescreen)</title>
    <script src="https://d3js.org/d3.v7.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body, html {
            margin: 0; padding: 0; width: 100vw; height: 100vh;
            overflow: hidden; background-color: #000000;
            font-family: Arial, Helvetica, sans-serif; color: white;
            cursor: default; touch-action: none;
        }

        /* 1. OVERLAYS */
        #sleep-overlay { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: #000000; z-index: 10000; display: none; }
        #quiz-overlay {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            background: rgba(0,0,0,0.95); z-index: 9999; display: none;
            align-items: center; justify-content: center; pointer-events: auto;
        }
        .quiz-card { background: rgba(15, 23, 42, 0.98); border: 2px solid #a855f7; padding: 20px; border-radius: 20px; width: 50vw; text-align: center; }
        .option-btn { display: block; width: 100%; padding: 8px; margin: 5px 0; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.2); border-radius: 10px; font-size: 3vh; font-weight: bold; cursor: pointer; }
        .option-btn:hover { background: #0b5ed7; border-color: white; }

        /* 2. KNOWLEDGE BUTTON - Adjusted for 540px height */
        .knowledge-btn {
            position: fixed; bottom: 4vh; right: 4vw; z-index: 9000;
            padding: 10px 20px; background: rgba(109, 40, 217, 0.6);
            border: 2px solid #fbbf24; border-radius: 50px; color: white;
            font-weight: 800; font-size: 2.2vh; text-transform: uppercase;
            letter-spacing: 1px; cursor: pointer; pointer-events: auto;
            animation: btn-pulse 2.5s infinite;
        }
        @keyframes btn-pulse { 0%, 100% { box-shadow: 0 0 10px rgba(168, 85, 247, 0.4); } 50% { box-shadow: 0 0 20px rgba(251, 191, 36, 0.5); } }

        /* 3. UI LAYOUT - Optimized for 1920x540 */
        .ui-root {
            position: absolute; left: 4vw; top: 0; bottom: 0;
            width: 40vw; z-index: 500; pointer-events: none;
            display: flex; flex-direction: column; justify-content: center;
            gap: 4vh;
        }

        .header-box { pointer-events: auto; }
        .philips-title { font-size: 3.5vh; font-weight: 900; color: #0b5ed7; letter-spacing: 1px; margin-bottom: 2px; text-transform: uppercase; }
        .main-heading { font-size: 4.5vh; color: #a855f7; font-weight: 800; white-space: nowrap; }
        .main-heading span { display: inline-block; transition: all 0.5s ease; }
        
        @keyframes wordPulse {
            0%, 20%, 100% { transform: scale(1); color: #a855f7; text-shadow: 0 0 10px rgba(168, 85, 247, 0.4); }
            10% { transform: scale(1.1); color: #fbbf24; text-shadow: 0 0 20px rgba(251, 191, 36, 0.6); }
        }
        @keyframes ampJump { 0%, 55%, 75%, 100% { transform: translateY(0); } 65% { transform: translateY(-10px); } }

        .w1 { animation: wordPulse 3s infinite 0.0s; }
        .w_amp { color: #a855f7 !important; margin: 0 0.5vw; animation: ampJump 3s infinite; }
        .w2 { animation: wordPulse 3s infinite 0.6s; }
        .w3 { animation: wordPulse 3s infinite 1.2s; }
        .w4 { animation: wordPulse 3s infinite 1.8s; }
        .w5 { animation: wordPulse 3s infinite 2.4s; }

        .stats-box { pointer-events: auto; width: 100%; }
        .label { font-size: 2.2vh; color: #38bdf8; text-transform: uppercase; font-weight: 900; letter-spacing: 2px; }
        
        /* REDUCED SIZE FOR 540 HEIGHT */
        .count { font-size: 11vh; font-weight: 900; color: #fbbf24; line-height: 1; margin: 0; }
        
        .progress-ui { width: 90%; margin-top: 5px; }
        .bar-wrapper { width: 100%; height: 10px; background: rgba(255,255,255,0.1); border-radius: 20px; overflow: hidden; margin-top: 4px; }
        .bar-fill { height: 100%; width: 0%; background: #fbbf24; box-shadow: 0 0 10px #fbbf24; }
        #clock { color: #fbbf24; font-size: 2.8vh; font-weight: bold; display: block; text-align: center; margin-top: 5px; }

        /* 4. CANVAS */
        .stars-container { position: absolute; width: 100%; height: 100%; z-index: 1; pointer-events: none; }
        .star { position: absolute; background: white; border-radius: 50%; animation: blink var(--t) infinite ease-in-out; }
        @keyframes blink { 0%, 100% { opacity: 0.1; transform: scale(0.8); } 50% { opacity: 0.8; } }
        .canvas-container { position: absolute; left: 0; top: 0; width: 100vw; height: 100vh; z-index: 5; }
        #main-canvas { width: 100%; height: 100%; cursor: grab; }
        #main-canvas:active { cursor: grabbing; }

        #loading { position: absolute; width: 100%; height: 100%; background: #000000; display: flex; align-items: center; justify-content: center; z-index: 11000; color: #38bdf8; font-size: 4vh; }
    </style>
</head>
<body>

    <div id="loading">CALIBRATING INTERACTION ENGINE...</div>
    <div id="sleep-overlay"></div>
    
    <div id="quiz-overlay">
        <div class="quiz-card">
            <h2 id="quiz-question" class="text-2xl font-bold mb-4 text-white">Question</h2>
            <div id="quiz-options"></div>
            <div id="quiz-feedback" class="mt-2"></div>
        </div>
    </div>

    <button class="knowledge-btn" id="quiz-trigger" onclick="openQuiz()">Knowledge check</button>

    <div class="ui-root">
        <div class="header-box">
            <div class="philips-title">PHILIPS</div>
            <h1 class="main-heading">
                <span class="w1">Mother</span> <span class="w_amp">&</span> <span class="w2">Child</span> <span class="w3">Care</span>
            </h1>
        </div>

        <div class="stats-box">
            <span class="label">Birth Count Today</span>
            <div id="birthCount" class="count">0</div>
            <div class="progress-ui">
                <div class="flex justify-between w-[100%] mb-1 px-1">
                    <span class="text-cyan-400 font-bold text-[1.8vh]">00:00</span>
                    <span class="text-cyan-400 font-bold text-[1.8vh]">24:00</span>
                </div>
                <div class="bar-wrapper"><div id="bar" class="bar-fill"></div></div>
                <span id="clock">00:00:00</span>
            </div>
        </div>
    </div>

    <div class="stars-container" id="starfield"></div>
    <div class="canvas-container"><canvas id="main-canvas"></canvas></div>

    <script>
        var BIRTH_RATE = 4.34, EARTH_ROT_SPD = 0.008, RESUME_DELAY = 5000, TARGET_TILT = -15;

        var quizData = [
            { q: "In which year was Philips founded?", o: ["1885", "1891", "1905", "1912"], a: 1 },
            { q: "Who founded Philips?", o: ["Gerard & Frederik", "Anton & Gerard", "Willem & Anton", "Gerard & Siemens"], a: 1 },
            { q: "Philips aims to improve how many lives by 2030?", o: ["100m", "500m", "1 billion", "5 billion"], a: 2 },
            { q: "What was Philips’ first main product?", o: ["Radios", "Shavers", "Light Bulbs", "X-ray"], a: 2 },
            { q: "In the 2010s, Philips shifted its primary focus to:", o: ["Electronics", "Healthcare technology", "Automotive", "Telecom"], a: 1 }
        ];

        function openQuiz() {
            var overlay = document.getElementById('quiz-overlay'), qText = document.getElementById('quiz-question'), oBox = document.getElementById('quiz-options'), fBox = document.getElementById('quiz-feedback');
            fBox.innerText = ""; oBox.innerHTML = ""; overlay.style.display = "flex";
            var qObj = quizData[Math.floor(Math.random() * quizData.length)];
            qText.innerText = qObj.q;
            for(var i=0; i<qObj.o.length; i++){
                var btn = document.createElement('button');
                btn.className = "option-btn"; btn.innerText = String.fromCharCode(65 + i) + ". " + qObj.o[i];
                btn.onclick = (function(idx, correct, correctText) {
                    return function() {
                        if (idx === correct) { fBox.innerHTML = "<span style='color:#4ade80'>👍 Thumbs Up!</span>"; } 
                        else { fBox.innerHTML = "<span style='color:#f43f5e'>Correct: " + correctText + "</span>"; }
                        setTimeout(function(){ overlay.style.display = "none"; }, 3000);
                    };
                })(i, qObj.a, qObj.o[qObj.a]);
                oBox.appendChild(btn);
            }
        }

        var moon = { d:300, sz:45, spd:0.0012, ang:Math.random()*7, col:"#f0f9ff" };
        var saturn = { d:500, sz:25, spd:0.0002, ang:Math.random()*7, col: "#d8ae8d" };
        var planets = [{id:'mer',d:120,sz:5,spd:0.0008,col:"#A5A5A5",ang:Math.random()*7}];
        var worldGeo = null, featureIndex = {}, flashingISO = {}, comets = [];
        var canvas = document.getElementById("main-canvas"), context = canvas.getContext("2d");
        var w, h, isDragging = false, lastX, lastY, rotX = 0, rotY = TARGET_TILT, lastT = Date.now(), lastIntT = Date.now();

        function setSizes() { w = window.innerWidth; h = window.innerHeight; canvas.width = w; canvas.height = h; }
        setSizes();
        
        // ADJUSTED PROJECTION SCALE FOR 1920x540
        var projection = d3.geoOrthographic().scale(h/2.1).translate([w*0.74, h*0.5]).clipAngle(90);
        var path = d3.geoPath(projection, context);

        function startDrag(x, y) { isDragging = true; lastX = x; lastY = y; lastIntT = Date.now(); }
        function moveDrag(x, y) { 
            if (isDragging) {
                rotX += (x - lastX) * 0.3; rotY -= (y - lastY) * 0.3;
                lastX = x; lastY = y; lastIntT = Date.now();
            }
        }
        function endDrag() { isDragging = false; lastIntT = Date.now(); }

        canvas.addEventListener('mousedown', function(e) { startDrag(e.clientX, e.clientY); });
        window.addEventListener('mousemove', function(e) { moveDrag(e.clientX, e.clientY); });
        window.addEventListener('mouseup', endDrag);

        function init() {
            d3.json("https://raw.githubusercontent.com/nvkelso/natural-earth-vector/master/geojson/ne_110m_admin_0_countries.geojson").then(function(data) {
                worldGeo = data;
                for(var i=0; i<data.features.length; i++){ var f = data.features[i]; featureIndex[f.properties.ISO_A3 || f.properties.ADM0_A3] = f; }
                document.getElementById('loading').style.display='none';
                requestAnimationFrame(renderLoop); startSimulation();
            });
        }

        function renderLoop() {
            var now = Date.now(), dt = now - lastT; lastT = now;
            if (!isDragging && now - lastIntT > RESUME_DELAY) {
                rotX += EARTH_ROT_SPD * dt;
                if (Math.abs(rotY - TARGET_TILT) > 0.1) rotY += (TARGET_TILT - rotY) * 0.02;
            }

            projection.rotate([rotX, rotY]);
            context.clearRect(0,0,w,h);
            var ex=w*0.74, ey=h*0.5;

            var sAng = now * 0.00003, sx = ex + Math.cos(sAng)*(w*0.4), sy = ey + Math.sin(sAng)*(h*0.3);
            var sGrad = context.createRadialGradient(sx,sy,0,sx,sy,40);
            sGrad.addColorStop(0,"#ffffff"); sGrad.addColorStop(1,"transparent");
            context.beginPath(); context.arc(sx,sy,40,0,7); context.fillStyle=sGrad; context.fill();

            drawPlanet(moon, ex, ey, sx, sy, dt);
            drawPlanet(saturn, ex, ey, sx, sy, dt);

            var radius = projection.scale();
            var oceanGrad = context.createRadialGradient(ex-radius/3, ey-radius/3, radius/20, ex, ey, radius);
            oceanGrad.addColorStop(0, "#3b82f6"); oceanGrad.addColorStop(1, "#020617");
            context.beginPath(); context.arc(ex, ey, radius, 0, 7); context.fillStyle = oceanGrad; context.fill();

            if (worldGeo) {
                context.beginPath(); path(worldGeo); context.fillStyle = "#10b981"; context.fill();
                context.strokeStyle = "rgba(255,255,255,0.2)"; context.stroke();
            }
            updateComets();
            requestAnimationFrame(renderLoop);
        }

        function drawPlanet(p,ex,ey,sx,sy,dt){
            p.ang += p.spd*dt*0.1; var px=ex+Math.cos(p.ang)*p.d, py=ey+Math.sin(p.ang)*p.d*0.5;
            context.beginPath(); context.arc(px,py,p.sz,0,7); context.fillStyle=p.col || "white"; context.fill();
        }

        function updateComets() {
            if (Math.random() > 0.99) comets.push({ x:Math.random()*w, y:-50, vx:-10, vy:8, life:1 });
            for (var i=0; i<comets.length; i++) {
                var c = comets[i]; context.strokeStyle="white"; context.beginPath(); context.moveTo(c.x,c.y); context.lineTo(c.x+20,c.y-20); context.stroke();
                c.x+=c.vx; c.y+=c.vy; c.life-=0.01; if(c.life<=0){ comets.splice(i,1); i--; }
            }
        }

        function startSimulation() {
            setInterval(function() {
                var now = new Date(), start = new Date(now.getFullYear(), now.getMonth(), now.getDate()).getTime();
                var elapsed = (Date.now() - start) / 1000;
                document.getElementById('birthCount').innerText = Math.floor(elapsed * BIRTH_RATE).toString().replace(/\B(?=(\d{3})+(?!\d))/g, ".");
                document.getElementById('clock').innerText = now.toLocaleTimeString('en-GB');
                document.getElementById('bar').style.width = (elapsed / 86400 * 100) + "%";
            }, 500);
        }

        var field = document.getElementById('starfield');
        for (var i = 0; i < 50; i++) {
            var s = document.createElement('div'); s.className = 'star';
            s.style.width = s.style.height = (1 + Math.random()) + 'px';
            s.style.left = Math.random()*100 + '%'; s.style.top = Math.random()*100 + '%';
            s.style.setProperty('--t', (2 + Math.random()*2) + 's');
            field.appendChild(s);
        }
        window.onresize = setSizes; init();
    </script>
</body>
</html>
